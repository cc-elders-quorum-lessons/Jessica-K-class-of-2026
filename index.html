<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jessica K Graduation</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to bottom, #000428, #004e92);
    color: white;
}

/* HERO IMAGE */
.hero {
    background: url('images/DSC_9766.JPG') no-repeat center/cover;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.hero h1 {
    font-size: 3em;
    background: rgba(0,0,0,0.5);
    padding: 15px;
    border-radius: 10px;
}

.hero p {
    font-size: 1.5em;
}

/* SLIDESHOW */
.slideshow {
    max-width: 800px;
    margin: auto;
}

.slide {
    display: none;
}

.slide img {
    width: 100%;
    border-radius: 10px;
}

/* RSVP */
.rsvp {
    margin-top: 40px;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

button {
    background: gold;
    cursor: pointer;
}

/* FIREWORKS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="hero">
    <h1>🎓 Let’s Celebrate Jessica’s Graduation 🎓</h1>
    <p>Class of 2026 - Smoky Hill High School</p>
</div>

<h2>You're Invited!</h2>
<p>
Come to the Graduation Party<br>
📍 16739 E Prentice Cir, Centennial, CO 80015<br>
⏰ 3:00 PM<br>
Celebrate with family, friends, and classmates!
</p>

<!-- SLIDESHOW -->
<div class="slideshow">
    <div class="slide"><img src="images/DSC_0090.JPG"></div>
    <div class="slide"><img src="images/DSC_9684.JPG"></div>
    <div class="slide"><img src="images/DSC_9763.JPG"></div>
    <div class="slide"><img src="images/DSC_9830.JPG"></div>
    <div class="slide"><img src="images/DSC_9917.JPG"></div>
    <div class="slide"><img src="images/DSC_9920.JPG"></div>
    <div class="slide"><img src="images/DSC_9933.JPG"></div>
    <div class="slide"><img src="images/DSC_9953.JPG"></div>
    <div class="slide"><img src="images/DSC_9992.JPG"></div>
    <div class="slide"><img src="images/DSC_0132.JPG"></div>
    <div class="slide"><img src="images/DSC_9737.JPG"></div>
    <div class="slide"><img src="images/DSC_9723.JPG"></div>
</div>

<!-- RSVP -->
<div class="rsvp">
    <h2>RSVP</h2>
    <p>Let us know if you're coming!</p>
    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <input type="number" placeholder="How many people?"><br>
    <button onclick="alert('Thanks for RSVP!')">Submit</button>
</div>

<script>
/* SLIDESHOW */
let slideIndex = 0;
showSlides();

function showSlides() {
    let slides = document.getElementsByClassName("slide");
    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }
    slideIndex++;
    if (slideIndex > slides.length) { slideIndex = 1 }
    slides[slideIndex - 1].style.display = "block";
    setTimeout(showSlides, 3000);
}

/* FIREWORKS */
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function random(min, max) {
    return Math.random() * (max - min) + min;
}

function drawFirework() {
    let x = random(0, canvas.width);
    let y = random(0, canvas.height / 2);

    for (let i = 0; i < 20; i++) {
        ctx.beginPath();
        ctx.arc(x + random(-50,50), y + random(-50,50), 2, 0, Math.PI*2);
        ctx.fillStyle = `hsl(${random(0,360)},100%,50%)`;
        ctx.fill();
    }
}

setInterval(drawFirework, 500);
</script>

</body>
</html>
