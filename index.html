    :root {

      z-index: 0;

    .fireworks {

      background-position: 8% 10%, 88% 14%, 75% 80%;
      animation: twinkle 8s linear infinite;
    }

    .fireworks::before {

        radial-gradient(circle, rgba(255,255,255,0.9) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(242,193,78,0.75) 0 2px, transparent 3px);

      background-position: 50% 8%, 12% 50%;
      animation: twinkle 12s ease-in-out infinite;
    }

    @keyframes twinkle {

      font-size: 1.2rem;
      color: #4f3244;

      line-height: 1.7;

    }
